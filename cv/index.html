var activeTypes = {};
for (var t in ENTRY_TYPES) activeTypes[t] = true;

function isVisible(n) {
  if (n.type === 'skill')   return true;
  if (n.type === 'section') return n.sectionType === null || !!activeTypes[n.sectionType];
  return !!activeTypes[n.type];
}

function buildElements() {
  var els = [], ids = {};
  for (var i = 0; i < NODES.length; i++) {
    var n = NODES[i];
    if (!isVisible(n)) continue;
    ids[n.id] = true;
    var size = n.type === 'section' ? 72 : n.type === 'skill' ? 66 :
      ({ education:60, work:58, research:58, publication:58, teaching:54, service:55 }[n.type] || 56);
    els.push({ data: { id:n.id, label:n.label, type:n.type, color:n.color, size:size, title:n.title, body:n.body }});
  }
  for (var j = 0; j < EDGES.length; j++) {
    var e = EDGES[j];
    if (ids[e.source] && ids[e.target])
      els.push({ data: { id:e.id, source:e.source, target:e.target, etype:e.etype }});
  }
  return els;
}

var cy = null;

function initGraph() {
  if (cy) { cy.destroy(); cy = null; }
  cy = cytoscape({
    container: document.getElementById('cv-graph'),
    elements: buildElements(),
    layout: {
      name: 'fcose',
      animate: true,
      animationDuration: 650,
      randomize: true,
      nodeRepulsion: 9000,
      idealEdgeLength: 95,
      edgeElasticity: 0.45,
      nestingFactor: 0.1,
      gravity: 0.28,
      numIter: 2500,
    },
    style: [
      { selector: 'node', style: {
          'background-color':   'data(color)',
          'label':              'data(label)',
          'width':              'data(size)',
          'height':             'data(size)',
          'shape':              'ellipse',
          'color':              '#dde',
          'font-size':          10,
          'text-wrap':          'wrap',
          'text-max-width':     85,
          'text-valign':        'center',
          'text-halign':        'center',
          'text-outline-color': '#050510',
          'text-outline-width': 1.5,
          'border-width':       1,
          'border-color':       '#3a3a5a',
      }},
      { selector: 'node[type = "section"]', style: {
          'shape':              'round-rectangle',
          'font-size':          13,
          'font-weight':        'bold',
          'text-outline-width': 2,
          'border-width':       2.5,
          'border-color':       'data(color)',
          'background-color':   '#10102a',
          'color':              'data(color)',
      }},
      { selector: 'node[type = "skill"]', style: {
          'shape': 'diamond',
          'color': '#fff',
          'font-size': 9,
      }},
      { selector: 'node[type = "work"]',     style: { 'shape': 'round-rectangle' }},
      { selector: 'node[type = "research"]', style: { 'shape': 'round-rectangle' }},
      { selector: 'node[type = "service"]',  style: { 'shape': 'hexagon' }},
      { selector: 'edge', style: {
          'curve-style':        'bezier',
          'target-arrow-shape': 'none',
          'width':              1,
          'line-color':         '#3a3a60',
          'opacity':            0.55,
      }},
      { selector: 'node.selected', style: { 'border-width': 3.5, 'border-color': '#fff' }},
      { selector: 'node.neighbor', style: { 'border-width': 2,   'border-color': '#bbb' }},
      { selector: 'node.dimmed',   style: { 'opacity': 0.15 }},
      { selector: 'edge.active-edge', style: { 'line-color':'#8888cc', 'width':2, 'opacity':1 }},
      { selector: 'edge.dimmed',   style: { 'opacity': 0.04 }},
    ],
  });

  cy.on('tap', 'node', function (evt) {
    var n = evt.target;
    cy.elements().removeClass('selected neighbor dimmed active-edge');
    cy.elements().not(n.closedNeighborhood()).not('edge').addClass('dimmed');
    cy.edges().not(n.connectedEdges()).addClass('dimmed');
    n.addClass('selected');
    n.neighborhood('node').addClass('neighbor');
    n.connectedEdges().addClass('active-edge');
    document.getElementById('cv-panel-hint').style.display   = 'none';
    document.getElementById('cv-panel-detail').style.display = 'block';
    document.getElementById('cv-panel-title').textContent = n.data('title');
    document.getElementById('cv-panel-body').textContent  = n.data('body');
  });

  cy.on('tap', function (evt) {
    if (evt.target !== cy) return;
    cy.elements().removeClass('selected neighbor dimmed active-edge');
    document.getElementById('cv-panel-hint').style.display   = 'block';
    document.getElementById('cv-panel-detail').style.display = 'none';
  });
}

// Filters
document.querySelectorAll('.cvf-btn[data-type]').forEach(function (btn) {
  btn.addEventListener('click', function () {
    var t = btn.getAttribute('data-type');
    if (t === 'all') {
      var anyOff = Object.keys(activeTypes).some(function(k){ return !activeTypes[k]; });
      for (var k in activeTypes) activeTypes[k] = anyOff;
      document.querySelectorAll('.cvf-btn[data-type]').forEach(function (b) {
        if (b.getAttribute('data-type') !== 'all') b.classList.toggle('active', anyOff);
      });
    } else {
      activeTypes[t] = !activeTypes[t];
      btn.classList.toggle('active', activeTypes[t]);
    }
    initGraph();
  });
});
