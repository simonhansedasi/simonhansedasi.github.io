  { id: 'sk_ms_stats',      source: 'ms_uw',       target: 'sk_stats', etype: 'skill' },
  { id: 'sk_cert_ml',       source: 'ds_cert',     target: 'sk_ml',    etype: 'skill' },

  // ── Meaningful cross-section relations (career + research progression) ────
  { id: 'r_usaf_bs',       source: 'usaf',        target: 'bs_uw',       etype: 'relation' },
  { id: 'r_bs_admin',      source: 'uw_admin',    target: 'bs_uw',       etype: 'relation' },
  { id: 'r_isolab_ms',     source: 'uw_isolab',   target: 'ms_uw',       etype: 'relation' },
  { id: 'r_ms_glacier',    source: 'ms_uw',       target: 'glacier',     etype: 'relation' },
  { id: 'r_ms_grape',      source: 'ms_uw',       target: 'grape',       etype: 'relation' },
  { id: 'r_das_glacier',   source: 'das',         target: 'glacier',     etype: 'relation' },
  { id: 'r_glacier_jog',   source: 'glacier',     target: 'jog2026',     etype: 'relation' },
  { id: 'r_glacier_agu',   source: 'glacier',     target: 'agu2022',     etype: 'relation' },
  { id: 'r_js_nf',         source: 'javascript',  target: 'nature_food', etype: 'relation' },
  { id: 'r_grape_kush',    source: 'grape',       target: 'kush',        etype: 'relation' },
  { id: 'r_grape_js',      source: 'grape',       target: 'javascript',  etype: 'relation' },
  { id: 'r_rf_ag',         source: 'rippleforge', target: 'ai_glue',     etype: 'relation' },
  { id: 'r_ms_ta211',      source: 'ms_uw',       target: 'ta_ess211',   etype: 'relation' },
  { id: 'r_ms_ta102',      source: 'ms_uw',       target: 'ta_ess102',   etype: 'relation' },
  { id: 'r_ms_ta101',      source: 'ms_uw',       target: 'ta_ess101',   etype: 'relation' },
  { id: 'r_ms_gpss',       source: 'ms_uw',       target: 'gpss',        etype: 'relation' },
  { id: 'r_ms_uaw',        source: 'ms_uw',       target: 'uaw',         etype: 'relation' },
  { id: 'r_usaf_aadd',     source: 'usaf',        target: 'aadd',        etype: 'relation' },
  { id: 'r_admin_randys',  source: 'uw_admin',    target: 'randys',      etype: 'relation' },
];

// ── Build helpers ─────────────────────────────────────────────────────────
var activeTypes = {};
for (var t in ENTRY_TYPES) activeTypes[t] = true;

function isNodeVisible(n) {
  if (n.type === 'skill') return true;
  if (n.type === 'section') {
    if (n.sectionType === null) return true; // sec_skills always visible
    return !!activeTypes[n.sectionType];
  }
  return !!activeTypes[n.type];
}

function buildElements() {
  var els = [];
  var activeIds = {};

  for (var i = 0; i < NODES.length; i++) {
    var n = NODES[i];
    if (!isNodeVisible(n)) continue;
    activeIds[n.id] = true;

    var size;
    if (n.type === 'section') {
      size = 115;
    } else if (n.type === 'skill') {
      size = 74;
    } else {
      size = { education: 64, work: 62, research: 60, publication: 60, teaching: 56, service: 57 }[n.type] || 58;
    }

    els.push({ data: {
      id:          n.id,
      label:       n.label,
      type:        n.type,
      color:       n.color,
      size:        size,
      title:       n.title,
      body:        n.body,
      etype:       null,
    }});
  }

  for (var j = 0; j < EDGES.length; j++) {
    var e = EDGES[j];
    if (activeIds[e.source] && activeIds[e.target]) {
      els.push({ data: { id: e.id, source: e.source, target: e.target, etype: e.etype }});
    }
  }
  return els;
}

// ── Cytoscape init ────────────────────────────────────────────────────────
var cy = null;

function initGraph() {
  if (cy) { cy.destroy(); cy = null; }

  cy = cytoscape({
    container: document.getElementById('cv-graph'),
    elements: buildElements(),
    layout: {
      name: 'fcose',
      animate: true,
      animationDuration: 650,
      randomize: true,
      nodeRepulsion: 8500,
      idealEdgeLength: 90,
      edgeElasticity: 0.45,
      nestingFactor: 0.1,
      gravity: 0.3,
      numIter: 2500,
    },
    style: [
      // ── Base node ────────────────────────────────────────────────────────
      {
        selector: 'node',
        style: {
          'background-color':   'data(color)',
          'label':              'data(label)',
          'width':              'data(size)',
          'height':             'data(size)',
          'shape':              'ellipse',
          'color':              '#dde',
          'font-size':          9,
          'text-wrap':          'wrap',
          'text-max-width':     80,
          'text-valign':        'center',
          'text-halign':        'center',
          'text-outline-color': '#060612',
          'text-outline-width': 1.5,
          'border-width':       1,
          'border-color':       '#3a3a5a',
        }
      },
      // ── Section hubs ─────────────────────────────────────────────────────
      {
        selector: 'node[type = "section"]',
        style: {
          'shape':              'round-rectangle',
          'font-size':          12,
          'font-weight':        'bold',
          'text-outline-width': 2,
          'border-width':       2.5,
          'border-color':       'data(color)',
          'background-color':   '#111130',
          'color':              'data(color)',
          'text-outline-color': '#060612',
        }
      },
      // ── Skill cluster nodes ───────────────────────────────────────────────
      {
        selector: 'node[type = "skill"]',
        style: {
          'shape':  'diamond',
          'color':  '#fff',
          'font-size': 8.5,
        }
      },
      // ── Entry type shapes ─────────────────────────────────────────────────
      {
        selector: 'node[type = "work"]',
        style: { 'shape': 'round-rectangle' }
      },
      {
        selector: 'node[type = "research"]',
        style: { 'shape': 'round-rectangle' }
      },
      {
        selector: 'node[type = "service"]',
        style: { 'shape': 'hexagon' }
      },
      // ── Edges ─────────────────────────────────────────────────────────────
      {
        selector: 'edge',
        style: {
          'curve-style':          'bezier',
          'target-arrow-shape':   'none',
          'width':                1,
          'line-color':           '#2a2a50',
          'opacity':              0.55,
        }
      },
      {
        selector: 'edge[etype = "skill"]',
        style: {
          'line-color':  '#3d2d7a',
          'line-style':  'dashed',
          'line-dash-pattern': [4, 3],
          'opacity':     0.45,
        }
      },
      {
        selector: 'edge[etype = "relation"]',
        style: {
          'line-color':           '#5a5a8a',
          'target-arrow-shape':   'triangle',
          'target-arrow-color':   '#6a6a9a',
          'arrow-scale':          0.7,
          'width':                1.5,
          'opacity':              0.75,
        }
      },
      // ── Interaction states ────────────────────────────────────────────────
      {
        selector: 'node.selected',
        style: { 'border-width': 3.5, 'border-color': '#fff', 'border-opacity': 1 }
      },
      {
        selector: 'node.neighbor',
        style: { 'border-width': 2, 'border-color': '#ccc', 'opacity': 1 }
      },
      {
        selector: 'node.dimmed',
        style: { 'opacity': 0.18 }
      },
      {
        selector: 'edge.active-edge',
        style: { 'line-color': '#8888bb', 'target-arrow-color': '#8888bb', 'width': 2, 'opacity': 1 }
      },
      {
        selector: 'edge.dimmed',
        style: { 'opacity': 0.05 }
      },
    ],
  });

  cy.on('tap', 'node', function (evt) {
    var node = evt.target;
    cy.elements().removeClass('selected neighbor dimmed active-edge');

    var neighbors = node.closedNeighborhood();
    cy.elements().not(neighbors).not('edge').addClass('dimmed');
    cy.edges().not(node.connectedEdges()).addClass('dimmed');
    node.addClass('selected');
    node.neighborhood('node').addClass('neighbor');
    node.connectedEdges().addClass('active-edge');

    document.getElementById('cv-panel-hint').style.display   = 'none';
    document.getElementById('cv-panel-detail').style.display = 'block';
    document.getElementById('cv-panel-title').textContent = node.data('title');
    document.getElementById('cv-panel-body').textContent  = node.data('body');
  });

  cy.on('tap', function (evt) {
    if (evt.target === cy) {
      cy.elements().removeClass('selected neighbor dimmed active-edge');
      document.getElementById('cv-panel-hint').style.display   = 'block';
      document.getElementById('cv-panel-detail').style.display = 'none';
    }
  });
}

initGraph();

// ── Legend ─────────────────────────────────────────────────────────────────
var legendEl  = document.getElementById('cv-legend');
var legendHtml = '';
for (var type in ENTRY_TYPES) {
  legendHtml += '<div class="cvleg"><div class="cvleg-dot" style="background:' +
    ENTRY_TYPES[type].color + '"></div><span>' + ENTRY_TYPES[type].label + '</span></div>';
}
legendHtml += '<div class="cvleg"><div class="cvleg-dot" style="background:#7c3aed;border-radius:0;transform:rotate(45deg)"></div><span>Skills</span></div>';
legendEl.innerHTML = legendHtml;

// ── Filter buttons ─────────────────────────────────────────────────────────
document.querySelectorAll('.cvf-btn[data-type]').forEach(function (btn) {
  btn.addEventListener('click', function () {
    var t = btn.getAttribute('data-type');
    if (t === 'all') {
      var anyOff = false;
      for (var k in activeTypes) if (!activeTypes[k]) { anyOff = true; break; }
      for (var k2 in activeTypes) activeTypes[k2] = anyOff;
      document.querySelectorAll('.cvf-btn[data-type]').forEach(function (b) {
        if (b.getAttribute('data-type') !== 'all') b.classList.toggle('active', anyOff);
      });
    } else {
      activeTypes[t] = !activeTypes[t];
      btn.classList.toggle('active', activeTypes[t]);
    }
    initGraph();
  });
});

})();
</script>
